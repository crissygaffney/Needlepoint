<script type="text/babel">

// Simple hash (not cryptographic, just obfuscation for a personal app)
async function hashPin(pin){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pin+"np-salt-81x"));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// localStorage fallbacks (used for apiKey and pw only)
function lsStr(k){try{return localStorage.getItem(k)||"";}catch{return "";}}
function lsStrSet(k,v){try{localStorage.setItem(k,v);}catch(e){console.error(e);}}

// ── Supabase helpers ──────────────────────────────────────────────────────────
// Each table stores one row per record: id (text PK) + data (jsonb) + updated_at
// We store the entire collection as a single row with id="singleton"

async function sbGet(table){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.singleton&select=data`,{
      headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`}
    });
    if(!r.ok)return[];
    const rows=await r.json();
    return rows.length>0?rows[0].data:[];
  }catch(e){console.error("sbGet error",e);return[];}
}

async function sbSet(table,data){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}`,{
      method:"POST",
      headers:{
        "apikey":SUPA_KEY,
        "Authorization":`Bearer ${SUPA_KEY}`,
        "Content-Type":"application/json",
        "Prefer":"resolution=merge-duplicates"
      },
      body:JSON.stringify({id:"singleton",data,updated_at:new Date().toISOString()})
    });
    if(!r.ok){const t=await r.text();console.error("sbSet error",t);}
  }catch(e){console.error("sbSet error",e);}
}
// localStorage helpers now defined in storage section above

// ── Constants ─────────────────────────────────────────────────────────────────
const LINEN="#F5F0E8",LINEN_DARK="#EDE6D6",LINEN_BORDER="#D8CEBC";

const PROJECT_STATUSES=["Not Started","In Progress","Stitching Complete","Finishing in Progress","Finished","Gifted"];
const STATUS_COLOR={
  "Not Started":{color:TEXT_SOFT,bg:LINEN_DARK},
  "In Progress":{color:BLUE,bg:BLUE_BG},
  "Stitching Complete":{color:"#7C6A92",bg:"#f3f0f8"},
  "Finishing in Progress":{color:GOLD,bg:"#fdf8ec"},
  "Finished":{color:GREEN,bg:GREEN_BG},
  "Gifted":{color:"#c06090",bg:"#fdf0f7"},
};
const PHOTO_STAGES=["Blank Canvas","Inspiration","In Progress","Stitching Complete","Finishing in Progress","Finished","Other"];
const STAGE_EMOJI={"Blank Canvas":"🖼️","Inspiration":"💡","In Progress":"🪡","Stitching Complete":"✂️","Finishing in Progress":"🪢","Finished":"🎁","Other":"📷"};
const COLOR_FAMILIES=["Red","Pink","Orange","Yellow","Green","Blue","Purple","Brown","Neutral","White/Cream","Black/Gray","Gold/Metallic"];
const FINISHED_TYPES=["Pillow","Ornament","Tray","Frame","Bag","Belt","Box top","Footstool","Eyeglass case","Christmas stocking","Other"];

// ── Styles ────────────────────────────────────────────────────────────────────
const card={background:"#fff",border:`1px solid ${LINEN_BORDER}`,borderRadius:12,padding:"20px 24px",boxShadow:"0 2px 8px rgba(100,80,60,0.07)"};
const autofillCard={...card,background:"linear-gradient(135deg,#faf7ff 0%,#f5f0f8 100%)",border:`1.5px solid ${PLUM_LIGHT}`};
const inputBase={border:`1px solid ${LINEN_BORDER}`,borderRadius:6,padding:"7px 10px",fontSize:14,background:LINEN,color:TEXT,outline:"none",width:"100%",boxSizing:"border-box"};
const inputSm={...inputBase,flex:1,minWidth:60};
const btnPrimary={background:PLUM,color:"#fff",border:"none",borderRadius:7,padding:"9px 18px",fontFamily:"inherit",fontSize:14,fontWeight:600,cursor:"pointer"};
const btnSecondary={background:"transparent",color:PLUM,border:`1.5px solid ${PLUM}`,borderRadius:7,padding:"7px 14px",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer"};
const btnDanger={background:"transparent",color:"#C0785A",border:"none",fontSize:16,cursor:"pointer",padding:"2px 4px",lineHeight:1};
const lbl={display:"block",fontSize:12,fontWeight:700,color:TEXT_SOFT,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5};

// ── Data templates ────────────────────────────────────────────────────────────
function blankProject(){return{id:Date.now(),name:"",designer:"",supplier:"",canvasSize:"",meshCount:"",progress:0,status:"Not Started",colors:[],stitchAreas:[],photos:[],notes:"",startedAt:new Date().toISOString().slice(0,10),finishedObjects:[]};}
function blankThread(){return{id:Date.now(),brand:"Pepper Pot Silk",code:"",name:"",hex:"#cccccc",skeins:1,dyeLot:"",colorFamily:""};}
function blankWishlist(){return{id:Date.now(),name:"",designer:"",supplier:"",url:"",notes:"",photo:null,addedAt:new Date().toISOString().slice(0,10)};}
function blankFinishedObject(pid){return{id:Date.now(),projectId:pid,photo:null,type:"",finisher:"",dateFinished:new Date().toISOString().slice(0,10),notes:""};}

// ── Shared helpers ────────────────────────────────────────────────────────────
function statusAtLeast(status,threshold){return PROJECT_STATUSES.indexOf(status)>=PROJECT_STATUSES.indexOf(threshold);}
function projectThumb(p){return p.photos&&p.photos.length>0?p.photos[0].data:null;}

// ── Shared UI components ──────────────────────────────────────────────────────
function CanvasProgressBar({percent}){
  const cols=20,rows=4,filled=Math.round((percent/100)*cols*rows);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:2}}>
      {Array.from({length:rows}).map((_,r)=>(
        <div key={r} style={{display:"flex",gap:2}}>
          {Array.from({length:cols}).map((_,c)=>{
            const on=r*cols+c<filled;
            return <div key={c} style={{width:10,height:10,borderRadius:1,backgroundColor:on?PLUM:"#E8E0D0",boxShadow:on?"inset 1px 1px 0 rgba(255,255,255,0.25),inset -1px -1px 0 rgba(0,0,0,0.15)":"inset 1px 1px 0 rgba(255,255,255,0.6)"}}/>;
          })}
        </div>
      ))}
    </div>
  );
}

function Swatch({hex,size=22}){return <div style={{width:size,height:size,borderRadius:"50%",backgroundColor:hex||"#ccc",border:"2px solid rgba(0,0,0,0.12)",flexShrink:0}}/>;}

function StatusBadge({status}){
  const s=STATUS_COLOR[status]||{color:TEXT_SOFT,bg:LINEN_DARK};
  return <span style={{fontSize:11,fontFamily:"sans-serif",fontWeight:700,padding:"2px 8px",borderRadius:10,background:s.bg,color:s.color,whiteSpace:"nowrap"}}>{status}</span>;
}

function InvBadge({have}){return <span style={{fontSize:11,fontFamily:"sans-serif",fontWeight:700,padding:"2px 7px",borderRadius:10,background:have?GREEN_BG:RED_BG,color:have?GREEN:RED,whiteSpace:"nowrap"}}>{have?"✓ In stock":"Need to buy"}</span>;}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function Lightbox({photos,index,onClose}){
  const [idx,setIdx]=useState(index);
  if(!photos[idx])return null;
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{maxWidth:700,width:"100%"}}>
        <img src={photos[idx].data||photos[idx]} alt="" style={{width:"100%",maxHeight:"72vh",objectFit:"contain",borderRadius:8}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12,gap:10,flexWrap:"wrap"}}>
          <div style={{color:"#fff",fontFamily:"sans-serif"}}>
            {photos[idx].stage&&<div style={{fontSize:12,opacity:0.7}}>{STAGE_EMOJI[photos[idx].stage]||""} {photos[idx].stage}</div>}
            {photos[idx].caption&&<div style={{fontSize:14,marginTop:2}}>{photos[idx].caption}</div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            {idx>0&&<button onClick={()=>setIdx(i=>i-1)} style={{...btnSecondary,color:"#fff",borderColor:"rgba(255,255,255,0.4)"}}>← Prev</button>}
            {idx<photos.length-1&&<button onClick={()=>setIdx(i=>i+1)} style={{...btnSecondary,color:"#fff",borderColor:"rgba(255,255,255,0.4)"}}>Next →</button>}
            <button onClick={onClose} style={{...btnSecondary,color:"#fff",borderColor:"rgba(255,255,255,0.4)"}}>Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Photo Journal ─────────────────────────────────────────────────────────────
function PhotoJournal({photos,onChange}){
  const fileRef=useRef();
  const [lightboxIdx,setLightboxIdx]=useState(null);
  const [addingStage,setAddingStage]=useState("Blank Canvas");
  const safe=photos||[];
  function handlePick(e){
    Array.from(e.target.files).forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>{
        const np={id:Date.now()+Math.random(),data:ev.target.result,stage:addingStage,caption:"",date:new Date().toISOString().slice(0,10)};
        onChange(prev=>[...(prev||[]),np]);
      };
      r.readAsDataURL(file);
    });
    e.target.value="";
  }
  function updatePhoto(id,u){onChange(safe.map(p=>p.id===id?{...p,...u}:p));}
  function removePhoto(id){onChange(safe.filter(p=>p.id!==id));}
  const grouped={};
  PHOTO_STAGES.forEach(s=>{const ps=safe.filter(p=>p.stage===s);if(ps.length)grouped[s]=ps;});
  return(
    <div>
      {lightboxIdx!==null&&<Lightbox photos={safe} index={lightboxIdx} onClose={()=>setLightboxIdx(null)}/>}
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
        <select value={addingStage} onChange={e=>setAddingStage(e.target.value)} style={{...inputBase,width:"auto",minWidth:160,flex:1}}>
          {PHOTO_STAGES.map(s=><option key={s} value={s}>{STAGE_EMOJI[s]} {s}</option>)}
        </select>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handlePick}/>
        <button onClick={()=>fileRef.current.click()} style={btnPrimary}>+ Add Photo</button>
      </div>
      {safe.length===0&&<div style={{textAlign:"center",padding:24,color:TEXT_SOFT,fontSize:14,background:LINEN,borderRadius:8,border:`1px dashed ${LINEN_BORDER}`}}>No photos yet. Select a stage and tap + Add Photo.</div>}
      {Object.entries(grouped).map(([stage,ps])=>(
        <div key={stage} style={{marginBottom:18}}>
          <div style={{fontSize:12,fontWeight:700,color:TEXT_SOFT,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>{STAGE_EMOJI[stage]} {stage}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10}}>
            {ps.map(p=>{
              const idx=safe.indexOf(p);
              return(
                <div key={p.id} style={{borderRadius:8,overflow:"hidden",border:`1px solid ${LINEN_BORDER}`,background:"#fff"}}>
                  <img src={p.data} alt="" onClick={()=>setLightboxIdx(idx)} style={{width:"100%",height:110,objectFit:"cover",cursor:"pointer",display:"block"}}/>
                  <div style={{padding:"6px 8px"}}>
                    <input value={p.caption||""} onChange={e=>updatePhoto(p.id,{caption:e.target.value})} placeholder="Caption..." style={{...inputBase,fontSize:12,padding:"4px 6px",background:"transparent",border:"none",borderBottom:`1px solid ${LINEN_BORDER}`,borderRadius:0,marginBottom:4}}/>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <select value={p.stage} onChange={e=>updatePhoto(p.id,{stage:e.target.value})} style={{...inputBase,fontSize:11,padding:"3px 5px",flex:1}}>
                        {PHOTO_STAGES.map(s=><option key={s} value={s}>{s}</option>)}
                      </select>
                      <button onClick={()=>removePhoto(p.id)} style={{...btnDanger,fontSize:13}}>✕</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function PhotoJournalReadOnly({photos}){
  const [lightboxIdx,setLightboxIdx]=useState(null);
  const safe=photos||[];
  const grouped={};
  PHOTO_STAGES.forEach(s=>{const ps=safe.filter(p=>p.stage===s);if(ps.length)grouped[s]=ps;});
  return(
    <div style={{marginTop:8}}>
      {lightboxIdx!==null&&<Lightbox photos={safe} index={lightboxIdx} onClose={()=>setLightboxIdx(null)}/>}
      {Object.entries(grouped).map(([stage,ps])=>(
        <div key={stage} style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:TEXT_SOFT,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>{STAGE_EMOJI[stage]} {stage}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
            {ps.map(p=>{
              const idx=safe.indexOf(p);
              return(
                <div key={p.id} onClick={()=>setLightboxIdx(idx)} style={{cursor:"pointer",borderRadius:8,overflow:"hidden",border:`1px solid ${LINEN_BORDER}`}}>
                  <img src={p.data} alt="" style={{width:"100%",height:100,objectFit:"cover",display:"block"}}/>
                  {p.caption&&<div style={{padding:"4px 6px",fontSize:11,color:TEXT_SOFT,fontFamily:"sans-serif",background:"#fff"}}>{p.caption}</div>}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Auto-fill panel ───────────────────────────────────────────────────────────
function AutofillPanel({onApply,apiKey,mode="project"}){
  const [url,setUrl]=useState("");
  const [pastedText,setPastedText]=useState("");
  const [imageBase64,setImageBase64]=useState(null);
  const [imagePreview,setImagePreview]=useState(null);
  const [status,setStatus]=useState("idle");
  const [suggestion,setSuggestion]=useState(null);
  const [errorMsg,setErrorMsg]=useState("");
  const imgRef=useRef();

  function handleImagePick(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{setImagePreview(ev.target.result);setImageBase64(ev.target.result.split(",")[1]);};
    r.readAsDataURL(f);
  }

  async function runAutofill(){
    if(!url.trim()&&!pastedText.trim()&&!imageBase64){setErrorMsg("Provide a URL, paste some text, or upload a photo.");return;}
    if(!apiKey){setErrorMsg("Add your Anthropic API key in Settings (⚙️) first.");return;}
    setStatus("loading");setErrorMsg("");setSuggestion(null);
    try{
      // Fetch URL content if provided
      let pageContent="";
      if(url.trim()){
        try{
          const resp=await fetch(url.trim(),{mode:"cors"});
          if(resp.ok){
            const html=await resp.text();
            pageContent=html.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,"").replace(/<script[^>]*>[\s\S]*?<\/script>/gi,"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim().slice(0,3000);
          }
        }catch(e){console.warn("CORS fetch failed, using URL as context only");}
      }

      const parts=[];
      if(imageBase64){
        let mt="image/jpeg";
        if(imagePreview){const m=imagePreview.match(/^data:(image\/[a-z+]+);base64,/);if(m)mt=m[1];}
        parts.push({type:"image",source:{type:"base64",media_type:mt,data:imageBase64}});
      }

      let prompt="";
      if(mode==="thread"){
        prompt=`You are a needlepoint expert. The user has provided a photo of a thread skein or its label${pastedText.trim()?`, and this text: ${pastedText.trim()}`:""}.\n\nExtract thread details and return ONLY valid JSON (no fences, no prose):\n{"brand":"","code":"","name":"","colorFamily":"","hex":"","dyeLot":""}\n\nRules: brand=manufacturer name (e.g. Pepper Pot Silk, DMC, Weeks Dye Works), code=color number/code, name=color name, colorFamily=one of [Red,Pink,Orange,Yellow,Green,Blue,Purple,Brown,Neutral,White/Cream,Black/Gray,Gold/Metallic] or empty, hex=best guess hex color from image or empty, dyeLot=dye lot if visible or empty. Never invent data.`;
      } else {
        prompt=`You are a needlepoint expert helping a stitcher log her canvas projects.\n\n${url.trim()?`URL: ${url.trim()}\n`:""}${pageContent?`PAGE TEXT:\n${pageContent}\n`:""}${pastedText.trim()?`PASTED TEXT:\n${pastedText.trim()}\n`:""}${imageBase64?"An image has been provided (canvas photo or label).\n":""}\nExtract canvas details and return ONLY valid JSON (no fences, no prose):\n{"name":"","designer":"","supplier":"","canvasSize":"","meshCount":"","notes":"","colors":[],"stitchAreas":[],"confidence":"low"}\n\nRules: name=canvas name, designer=artist/studio, supplier=shop, canvasSize=dimensions, meshCount=number only, notes=description or other info, colors=[] unless explicitly listed (each:{"brand":"","code":"","name":"","hex":""}), stitchAreas=[] unless image shows design (each:{"area":"","stitch":"","notes":""}), confidence=high/medium/low. Empty string if unknown, never invent.`;
      }
      parts.push({type:"text",text:prompt});
      const content=parts.length===1?parts[0].text:parts;
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content}]}),
      });
      const data=await resp.json();
      if(!resp.ok)throw new Error(`API error ${resp.status}: ${JSON.stringify(data).slice(0,150)}`);
      const tb=(data.content||[]).find(b=>b.type==="text");
      if(!tb)throw new Error("No response from Claude");
      let raw=tb.text.trim().replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/```\s*$/i,"").trim();
      const m=raw.match(/\{[\s\S]*\}/);
      if(!m)throw new Error("Could not parse response");
      const parsed=JSON.parse(m[0]);
      if(parsed.colors)parsed.colors=parsed.colors.map(c=>({...c,id:Date.now()+Math.random()}));
      if(parsed.stitchAreas)parsed.stitchAreas=parsed.stitchAreas.map(a=>({...a,id:Date.now()+Math.random()}));
      setSuggestion(parsed);setStatus("preview");
    }catch(err){setErrorMsg("Error: "+err.message);setStatus("error");}
  }

  function applyAll(){onApply(suggestion);setSuggestion(null);setStatus("idle");setUrl("");setPastedText("");setImageBase64(null);setImagePreview(null);}

  const isThread=mode==="thread";
  return(
    <div style={autofillCard}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <span style={{fontSize:20}}>✨</span>
        <div>
          <h2 style={{margin:0,fontSize:16,fontWeight:700,color:PLUM}}>{isThread?"Auto-fill from Photo or Text":"Auto-fill from URL, Text, or Photo"}</h2>
          <p style={{margin:"2px 0 0",fontSize:13,color:TEXT_SOFT}}>{isThread?"Photograph a skein or label to fill in thread details automatically.":"Paste a shop URL, product text, or upload a canvas photo."}</p>
        </div>
      </div>
      {!isThread&&(
        <div style={{marginBottom:10}}>
          <label style={lbl}>Shop URL</label>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://www.shopmopsey.com/products/..." style={inputBase}/>
        </div>
      )}
      <textarea value={pastedText} onChange={e=>setPastedText(e.target.value)} placeholder={isThread?"Paste thread label text here (optional)...":"Paste product text here (optional)...\n\nExample:\nMaine Directional Sign by Ma Belle\n18 mesh, 5.75 x 8.75, $120"} style={{...inputBase,minHeight:isThread?60:80,resize:"vertical",fontFamily:"sans-serif",fontSize:13,marginBottom:10}}/>
      <input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImagePick}/>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <button onClick={()=>imgRef.current.click()} style={btnSecondary}>{imagePreview?"Replace image":"Upload image"}</button>
        {imagePreview&&<><img src={imagePreview} alt="" style={{width:44,height:44,objectFit:"cover",borderRadius:6,border:`1px solid ${LINEN_BORDER}`}}/><button onClick={()=>{setImageBase64(null);setImagePreview(null);}} style={{...btnDanger,fontSize:13}}>Remove</button></>}
      </div>
      {errorMsg&&<div style={{padding:"10px 14px",background:RED_BG,border:`1px solid #f0c0b0`,borderRadius:7,fontSize:13,color:RED,fontFamily:"sans-serif",marginBottom:10}}>{errorMsg}</div>}
      {status!=="preview"&&(
        <button onClick={runAutofill} style={{background:PLUM,color:"#fff",border:"none",borderRadius:7,padding:"9px 20px",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer",opacity:status==="loading"?0.7:1,display:"flex",alignItems:"center",gap:8}} disabled={status==="loading"}>
          {status==="loading"?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span> Analyzing...</>:"✨ Auto-fill fields"}
        </button>
      )}
      {status==="preview"&&suggestion&&(
        <div style={{marginTop:14,borderTop:`1px solid ${LINEN_BORDER}`,paddingTop:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>

            </span>
            <div style={{display:"flex",gap:8}}>

            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontFamily:"sans-serif",fontSize:13}}>
            {(isThread?[["Brand",suggestion.brand],["Code",suggestion.code],["Name",suggestion.name],["Color Family",suggestion.colorFamily],["Dye Lot",suggestion.dyeLot]]:[["Canvas Name",suggestion.name],["Designer",suggestion.designer],["Supplier",suggestion.supplier],["Size",suggestion.canvasSize],["Mesh",suggestion.meshCount],]).filter(([,v])=>v).map(([k,v])=>(
              <div key={k} style={{background:"#fff",borderRadius:6,padding:"7px 10px",border:`1px solid ${LINEN_BORDER}`}}>
                <div style={{fontSize:11,fontWeight:700,color:TEXT_SOFT,textTransform:"uppercase",marginBottom:1}}>{k}</div>
                <div style={{color:TEXT,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
                  {k==="Color Family"||k==="Code"?(v):<>{isThread&&k==="Name"&&suggestion.hex?<div style={{width:14,height:14,borderRadius:"50%",background:suggestion.hex,border:"1.5px solid rgba(0,0,0,0.15)",flexShrink:0}}/>:null}{v}</>}
                </div>
              </div>
            ))}

          {suggestion.notes&&<div style={{marginTop:6,background:"#fff",borderRadius:6,padding:"7px 10px",border:`1px solid ${LINEN_BORDER}`,fontFamily:"sans-serif",fontSize:13,color:TEXT_SOFT}}>{suggestion.notes}</div>}
          <p style={{margin:"8px 0 0",fontSize:12,color:TEXT_SOFT,fontFamily:"sans-serif"}}>Review above, then click "Apply to form" to copy in.</p>
        </div>
      )}
    </div>
  );
}

// ── Thread inventory ──────────────────────────────────────────────────────────
function InventoryTab({inventory,setInventory,apiKey}){
  const [search,setSearch]=useState("");
  const [brandFilter,setBrandFilter]=useState("All");
  const [familyFilter,setFamilyFilter]=useState("All");
  const [editing,setEditing]=useState(null);
  const [draft,setDraft]=useState(null);
  const brands=["All",...Array.from(new Set(inventory.map(t=>t.brand).filter(Boolean))).sort()];
  const filtered=inventory.filter(t=>{
    const q=search.toLowerCase();
    return(!q||t.brand.toLowerCase().includes(q)||t.code.toLowerCase().includes(q)||t.name.toLowerCase().includes(q))&&(brandFilter==="All"||t.brand===brandFilter)&&(familyFilter==="All"||t.colorFamily===familyFilter);
  }).sort((a,b)=>(a.brand+a.code).localeCompare(b.brand+b.code));
  function openNew(){setDraft(blankThread());setEditing("new");}
  function openEdit(t){setDraft({...t});setEditing(t.id);}
  function saveDraft(){
    if(!draft.code.trim()&&!draft.name.trim()){alert("Enter at least a code or color name.");return;}
    if(editing==="new")setInventory(prev=>[...prev,{...draft,id:Date.now()}]);
    else setInventory(prev=>prev.map(t=>t.id===editing?draft:t));
    setEditing(null);setDraft(null);
  }
  function del(id){if(!confirm("Remove this thread?"))return;setInventory(prev=>prev.filter(t=>t.id!==id));setEditing(null);setDraft(null);}
  function upd(k,v){setDraft(d=>({...d,[k]:v}));}
  function applyAutofill(s){setDraft(d=>({...d,brand:d.brand||s.brand||"",code:d.code||s.code||"",name:d.name||s.name||"",colorFamily:d.colorFamily||s.colorFamily||"",hex:d.hex==="cccccc"||!d.hex?s.hex||d.hex:d.hex,dyeLot:d.dyeLot||s.dyeLot||""}));}

  if(editing)return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>{setEditing(null);setDraft(null);}} style={{...btnSecondary,fontSize:13}}>← Back</button>
        <h2 style={{margin:0,fontSize:18,fontWeight:500,flex:1}}>{editing==="new"?"Add Thread":"Edit Thread"}</h2>
        <button onClick={saveDraft} style={btnPrimary}>Save</button>
      </div>
      <div style={{display:"grid",gap:14}}>
        <AutofillPanel onApply={applyAutofill} apiKey={apiKey} mode="thread"/>
        <div style={{...card,display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div><label style={lbl}>Brand</label><input style={inputBase} value={draft.brand} onChange={e=>upd("brand",e.target.value)} placeholder="e.g. Pepper Pot Silk"/></div>
          <div><label style={lbl}>Code</label><input style={inputBase} value={draft.code} onChange={e=>upd("code",e.target.value)} placeholder="e.g. 114"/></div>
          <div style={{gridColumn:"1 / -1"}}><label style={lbl}>Color Name</label><input style={inputBase} value={draft.name} onChange={e=>upd("name",e.target.value)} placeholder="e.g. Dusty Rose"/></div>
          <div><label style={lbl}>Color Family</label><select style={inputBase} value={draft.colorFamily} onChange={e=>upd("colorFamily",e.target.value)}><option value="">— select —</option>{COLOR_FAMILIES.map(f=><option key={f} value={f}>{f}</option>)}</select></div>
          <div><label style={lbl}>Swatch Color</label><div style={{display:"flex",alignItems:"center",gap:8}}><input type="color" value={draft.hex||"#cccccc"} onChange={e=>upd("hex",e.target.value)} style={{width:44,height:36,border:"none",padding:0,cursor:"pointer",borderRadius:4}}/><span style={{fontSize:13,color:TEXT_SOFT,fontFamily:"sans-serif"}}>{draft.hex}</span></div></div>
          <div><label style={lbl}>Skeins Owned</label><input type="number" min={0} style={inputBase} value={draft.skeins} onChange={e=>upd("skeins",Number(e.target.value))}/></div>
          <div style={{gridColumn:"1 / -1"}}><label style={lbl}>Dye Lot</label><input style={inputBase} value={draft.dyeLot} onChange={e=>upd("dyeLot",e.target.value)} placeholder="e.g. A23"/></div>
          <div style={{gridColumn:"1 / -1",display:"flex",justifyContent:"space-between",marginTop:4}}>
            {editing!=="new"&&<button onClick={()=>del(editing)} style={{...btnSecondary,color:"#C0785A",borderColor:"#C0785A"}}>Remove</button>}
            <button onClick={saveDraft} style={{...btnPrimary,marginLeft:"auto"}}>Save Thread</button>
          </div>
        </div>
      </div>
    </div>
  );
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:12,flexWrap:"wrap"}}>
        <div><h2 style={{margin:0,fontSize:22,fontWeight:400}}>My Thread Collection</h2><p style={{margin:"4px 0 0",fontSize:14,color:TEXT_SOFT}}>{inventory.length} thread{inventory.length!==1?"s":""} in inventory</p></div>
        <button onClick={openNew} style={btnPrimary}>+ Add Thread</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <input style={{...inputBase,flex:2,minWidth:140}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by brand, code, or name..."/>
        <select style={{...inputBase,flex:1,minWidth:110}} value={brandFilter} onChange={e=>setBrandFilter(e.target.value)}>{brands.map(b=><option key={b} value={b}>{b==="All"?"All brands":b}</option>)}</select>
        <select style={{...inputBase,flex:1,minWidth:110}} value={familyFilter} onChange={e=>setFamilyFilter(e.target.value)}>{["All",...COLOR_FAMILIES].map(f=><option key={f} value={f}>{f==="All"?"All colors":f}</option>)}</select>
      </div>
      {inventory.length===0?(
        <div style={{...card,textAlign:"center",padding:"48px 24px"}}><div style={{fontSize:40,marginBottom:12}}>🧵</div><p style={{color:TEXT_SOFT,fontSize:15,margin:"0 0 16px"}}>Your thread collection is empty.</p><button onClick={openNew} style={btnPrimary}>+ Add Thread</button></div>
      ):filtered.length===0?(
        <div style={{...card,textAlign:"center",padding:"32px 24px",color:TEXT_SOFT}}>No threads match your search.</div>
      ):(
        <div style={{display:"grid",gap:8}}>
          {filtered.map(t=>(
            <div key={t.id} onClick={()=>openEdit(t)} style={{...card,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
              <Swatch hex={t.hex} size={36}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14,color:TEXT}}>{t.brand} {t.code}{t.name?` · ${t.name}`:""}</div>
                <div style={{fontSize:12,color:TEXT_SOFT,fontFamily:"sans-serif",marginTop:2}}>{t.colorFamily&&<span>{t.colorFamily}</span>}{t.dyeLot&&<span>{t.colorFamily?" · ":""}Lot {t.dyeLot}</span>}</div>
              </div>
              <div style={{textAlign:"right",fontFamily:"sans-serif",flexShrink:0}}>
                <div style={{fontSize:15,fontWeight:700,color:t.skeins>0?GREEN:RED}}>{t.skeins}</div>
                <div style={{fontSize:11,color:TEXT_SOFT}}>skein{t.skeins!==1?"s":""}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Shopping List ─────────────────────────────────────────────────────────────
function ShoppingListTab({projects,inventory}){
  const [projectFilter,setProjectFilter]=useState("All");
  const activeProjects=projects.filter(p=>!statusAtLeast(p.status,"Finished"));

  const allNeeded=activeProjects.flatMap(p=>
    p.colors.filter(c=>{
      const m=inventory.find(t=>t.brand.trim().toLowerCase()===c.brand.trim().toLowerCase()&&t.code.trim().toLowerCase()===c.code.trim().toLowerCase()&&t.code.trim()!=="");
      return(!m||m.skeins===0)&&c.brand&&c.code;
    }).map(c=>({...c,projectName:p.name,projectId:p.id}))
  );

  const filtered=projectFilter==="All"?allNeeded:allNeeded.filter(c=>c.projectId===Number(projectFilter));

  // Deduplicate by brand+code, listing projects that need each
  const deduped=[];
  filtered.forEach(c=>{
    const existing=deduped.find(d=>d.brand.toLowerCase()===c.brand.toLowerCase()&&d.code.toLowerCase()===c.code.toLowerCase());
    if(existing){if(!existing.projects.includes(c.projectName))existing.projects.push(c.projectName);}
    else deduped.push({...c,projects:[c.projectName]});
  });

  return(
    <div>
      <div style={{marginBottom:16}}>
        <h2 style={{margin:"0 0 4px",fontSize:22,fontWeight:400}}>Shopping List</h2>
        <p style={{margin:0,fontSize:14,color:TEXT_SOFT}}>Threads needed across your active projects that aren't in your inventory.</p>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <select style={{...inputBase,flex:1}} value={projectFilter} onChange={e=>setProjectFilter(e.target.value)}>
          <option value="All">All active projects</option>
          {activeProjects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>
      {deduped.length===0?(
        <div style={{...card,textAlign:"center",padding:"48px 24px"}}>
          <div style={{fontSize:40,marginBottom:12}}>🛒</div>
          <p style={{color:TEXT_SOFT,fontSize:15,margin:0}}>{allNeeded.length===0?"You have everything you need! All threads are in your inventory.":"No threads needed for the selected project."}</p>
        </div>
      ):(
        <div>
          <div style={{fontSize:13,fontFamily:"sans-serif",color:TEXT_SOFT,marginBottom:10}}>{deduped.length} thread{deduped.length!==1?"s":""} to buy</div>
          <div style={{display:"grid",gap:8}}>
            {deduped.map((c,i)=>(
              <div key={i} style={{...card,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                <Swatch hex={c.hex} size={32}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14,color:TEXT}}>{c.brand} {c.code}{c.name?` · ${c.name}`:""}</div>
                  <div style={{fontSize:12,color:TEXT_SOFT,fontFamily:"sans-serif",marginTop:2}}>
                    {c.element&&<span>{c.element} · </span>}
                    {c.projects.join(", ")}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Wishlist tab ──────────────────────────────────────────────────────────────
function WishlistTab({wishlist,setWishlist,apiKey}){
  const [editing,setEditing]=useState(null);
  const [draft,setDraft]=useState(null);
  const photoRef=useRef();

  function openNew(){setDraft(blankWishlist());setEditing("new");}
  function openEdit(w){setDraft({...w});setEditing(w.id);}
  function saveDraft(){
    if(!draft.name.trim()){alert("Canvas name is required.");return;}
    if(editing==="new")setWishlist(prev=>[...prev,{...draft,id:Date.now()}]);
    else setWishlist(prev=>prev.map(w=>w.id===editing?draft:w));
    setEditing(null);setDraft(null);
  }
  function del(id){if(!confirm("Remove from wishlist?"))return;setWishlist(prev=>prev.filter(w=>w.id!==id));setEditing(null);setDraft(null);}
  function upd(k,v){setDraft(d=>({...d,[k]:v}));}
  function pickPhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>upd("photo",ev.target.result);r.readAsDataURL(f);}
  function applyAutofill(s){setDraft(d=>({...d,name:d.name||s.name||"",designer:d.designer||s.designer||"",supplier:d.supplier||s.supplier||"",notes:d.notes?(d.notes+(s.notes?"\n\n"+s.notes:"")):(s.notes||"")}));}

  if(editing&&draft)return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>{setEditing(null);setDraft(null);}} style={{...btnSecondary,fontSize:13}}>← Back</button>
        <h2 style={{margin:0,fontSize:18,fontWeight:500,flex:1}}>{editing==="new"?"Add to Wishlist":"Edit Wishlist Item"}</h2>
        <button onClick={saveDraft} style={btnPrimary}>Save</button>
      </div>
      <div style={{display:"grid",gap:14}}>
        <AutofillPanel onApply={applyAutofill} apiKey={apiKey}/>
        <div style={{...card,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1 / -1"}}><label style={lbl}>Canvas Name *</label><input style={inputBase} value={draft.name} onChange={e=>upd("name",e.target.value)} placeholder="e.g. Maine Directional Sign"/></div>
          <div><label style={lbl}>Designer</label><input style={inputBase} value={draft.designer} onChange={e=>upd("designer",e.target.value)} placeholder="e.g. Ma Belle"/></div>
          <div><label style={lbl}>Supplier</label><input style={inputBase} value={draft.supplier} onChange={e=>upd("supplier",e.target.value)} placeholder="e.g. Mopsey Shop"/></div>
          <div style={{gridColumn:"1 / -1"}}><label style={lbl}>URL</label><input style={inputBase} value={draft.url} onChange={e=>upd("url",e.target.value)} placeholder="https://..."/></div>
          
          <div><label style={lbl}>Date Added</label><input type="date" style={inputBase} value={draft.addedAt} onChange={e=>upd("addedAt",e.target.value)}/></div>
          <div style={{gridColumn:"1 / -1"}}><label style={lbl}>Notes</label><textarea style={{...inputBase,minHeight:64,resize:"vertical",fontFamily:"Georgia,serif"}} value={draft.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Notes, priority, gift ideas..."/></div>
          <div style={{gridColumn:"1 / -1"}}>
            <label style={lbl}>Photo</label>
            {draft.photo&&<div style={{marginBottom:8}}><img src={draft.photo} alt="" style={{maxWidth:160,maxHeight:160,objectFit:"cover",borderRadius:8,border:`1px solid ${LINEN_BORDER}`}}/><div><button onClick={()=>upd("photo",null)} style={{...btnDanger,fontSize:13,marginTop:4}}>Remove</button></div></div>}
            <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={pickPhoto}/>
            <button onClick={()=>photoRef.current.click()} style={btnSecondary}>{draft.photo?"Replace photo":"Upload photo"}</button>
          </div>
          <div style={{gridColumn:"1 / -1",display:"flex",justifyContent:"space-between",marginTop:4}}>
            {editing!=="new"&&<button onClick={()=>del(editing)} style={{...btnSecondary,color:"#C0785A",borderColor:"#C0785A"}}>Remove</button>}
            <button onClick={saveDraft} style={{...btnPrimary,marginLeft:"auto"}}>Save</button>
          </div>
        </div>
      </div>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:12,flexWrap:"wrap"}}>
        <div><h2 style={{margin:0,fontSize:22,fontWeight:400}}>Canvas Wishlist</h2><p style={{margin:"4px 0 0",fontSize:14,color:TEXT_SOFT}}>{wishlist.length} canvas{wishlist.length!==1?"es":""} on your list</p></div>
        <button onClick={openNew} style={btnPrimary}>+ Add Canvas</button>
      </div>
      {wishlist.length===0?(
        <div style={{...card,textAlign:"center",padding:"48px 24px"}}><div style={{fontSize:40,marginBottom:12}}>🛍️</div><p style={{color:TEXT_SOFT,fontSize:15,margin:"0 0 16px"}}>Your wishlist is empty.</p><button onClick={openNew} style={btnPrimary}>+ Add Canvas</button></div>
      ):(
        <div style={{display:"grid",gap:12}}>
          {wishlist.map(w=>(
            <div key={w.id} onClick={()=>openEdit(w)} style={{...card,display:"flex",gap:14,alignItems:"flex-start",cursor:"pointer"}}>
              <div style={{width:64,height:64,borderRadius:8,background:LINEN_DARK,flexShrink:0,overflow:"hidden",border:`1px solid ${LINEN_BORDER}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {w.photo?<img src={w.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:24}}>🛍️</span>}

                </div>
                {w.notes&&<div style={{fontSize:12,color:TEXT_SOFT,marginTop:4,fontStyle:"italic"}}>{w.notes.slice(0,80)}{w.notes.length>80?"...":""}</div>}
                {w.url&&<a href={w.url} target="_blank" onClick={e=>e.stopPropagation()} style={{fontSize:12,color:PLUM,fontFamily:"sans-serif",display:"block",marginTop:4}}>View listing →</a>}

  );

// ── Gallery tabs ──────────────────────────────────────────────────────────────
function GalleryTab({projects,threshold,title,emoji,description,onGoToProject}){
  const [lightboxPhotos,setLightboxPhotos]=useState(null);
  const [lightboxIdx,setLightboxIdx]=useState(0);

  const eligibleProjects=projects.filter(p=>statusAtLeast(p.status,threshold));
  const photoStageFilter=threshold==="Stitching Complete"?"Stitching Complete":"Finished";

  const allPhotos=eligibleProjects.flatMap(p=>
    (p.photos||[]).filter(ph=>ph.stage===photoStageFilter).map(ph=>({...ph,projectName:p.name,projectId:p.id,projectDesigner:p.designer}))
  );

  function openLightbox(photos,idx){setLightboxPhotos(photos);setLightboxIdx(idx);}

  return(
    <div>
      {lightboxPhotos&&<Lightbox photos={lightboxPhotos} index={lightboxIdx} onClose={()=>setLightboxPhotos(null)}/>}
      <div style={{marginBottom:20}}>
        <h2 style={{margin:"0 0 4px",fontSize:22,fontWeight:400}}>{emoji} {title}</h2>
        <p style={{margin:0,fontSize:14,color:TEXT_SOFT}}>{description}</p>
      </div>
      {allPhotos.length===0?(
        <div style={{...card,textAlign:"center",padding:"48px 24px"}}>
          <div style={{fontSize:40,marginBottom:12}}>{emoji}</div>
          <p style={{color:TEXT_SOFT,fontSize:15,margin:0}}>No photos here yet. Upload photos tagged "{photoStageFilter}" in a project that has reached {threshold} status.</p>
        </div>
      ):(
        <div>
          {eligibleProjects.filter(p=>(p.photos||[]).some(ph=>ph.stage===photoStageFilter)).map(p=>{
            const ps=(p.photos||[]).filter(ph=>ph.stage===photoStageFilter);
            return(
              <div key={p.id} style={{marginBottom:24}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:15,color:TEXT}}>{p.name}</div>
                    {p.designer&&<div style={{fontSize:12,color:TEXT_SOFT}}>{p.designer}</div>}
                  </div>
                  <button onClick={()=>onGoToProject(p.id)} style={{...btnSecondary,fontSize:12,padding:"5px 10px"}}>View project →</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
                  {ps.map((ph,i)=>(
                    <div key={ph.id} onClick={()=>openLightbox(ps,i)} style={{cursor:"pointer",borderRadius:10,overflow:"hidden",border:`1px solid ${LINEN_BORDER}`,boxShadow:"0 2px 6px rgba(100,80,60,0.07)"}}>
                      <img src={ph.data} alt="" style={{width:"100%",height:160,objectFit:"cover",display:"block"}}/>
                      {ph.caption&&<div style={{padding:"6px 10px",fontSize:12,color:TEXT_SOFT,fontFamily:"sans-serif",background:"#fff"}}>{ph.caption}</div>}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

      </div>
    </div>
  );
}

// ── Password gate ────────────────────────────────────────────────────────────
function PasswordGate({onUnlock}){
  const [pin,setPin]=useState("");
  const [error,setError]=useState("");
  const [isFirst,setIsFirst]=useState(false);
  const [confirm,setConfirm]=useState("");
  const inputRef=useRef();

  useEffect(()=>{
    const stored=lsStr(PW_KEY);
    if(!stored)setIsFirst(true);
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),100);
  },[]);

  async function handleSubmit(){
    const h=await hashPin(pin);
    if(isFirst){
      if(pin.length<4){setError("Please enter at least 4 characters.");return;}
      if(pin!==confirm){setError("Passwords don't match.");return;}
      lsStrSet(PW_KEY,h);
      onUnlock();
    } else {
      const stored=lsStr(PW_KEY);
      if(h===stored){onUnlock();}
      else{setError("Incorrect password.");setPin("");setConfirm("");}
    }
  }

  function handleKey(e){if(e.key==="Enter")handleSubmit();}

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{...card,width:"100%",maxWidth:360,textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:8}}>🔒</div>
        <h2 style={{margin:"0 0 6px",fontSize:18,fontWeight:700}}>{isFirst?"Create a Password":"Enter Password"}</h2>
        <p style={{margin:"0 0 18px",fontSize:13,color:TEXT_SOFT}}>{isFirst?"Set a password to protect your settings.":"Enter your password to access settings."}</p>
        <input
          ref={inputRef}
          type="password"
          value={pin}
          onChange={e=>{setPin(e.target.value);setError("");}}
          onKeyDown={handleKey}
          placeholder={isFirst?"New password":"Password"}
          style={{...inputBase,textAlign:"center",fontSize:16,marginBottom:10,letterSpacing:"0.1em"}}
        />
        {isFirst&&(
          <input
            type="password"
            value={confirm}
            onChange={e=>{setConfirm(e.target.value);setError("");}}
            onKeyDown={handleKey}
            placeholder="Confirm password"
            style={{...inputBase,textAlign:"center",fontSize:16,marginBottom:10,letterSpacing:"0.1em"}}
          />
        )}
        {error&&<div style={{fontSize:13,color:RED,marginBottom:10,fontFamily:"sans-serif"}}>{error}</div>}
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>window.history.back?window.dispatchEvent(new Event("closepwgate")):null} style={btnSecondary} onClickCapture={e=>{e.stopPropagation();window.dispatchEvent(new CustomEvent("closepwgate"));}}>Cancel</button>
          <button onClick={handleSubmit} style={btnPrimary}>{isFirst?"Set Password":"Unlock"}</button>
        </div>
      </div>
    </div>
  );
}

function SettingsPanel({apiKey,setApiKey,projects,inventory,wishlist,onClose}){
  const [draftKey,setDraftKey]=useState(apiKey);
  function save(){lsStrSet(KEY_KEY,draftKey);setApiKey(draftKey);onClose();}

  function exportData(){
    const data=JSON.stringify({projects,inventory,wishlist,exportedAt:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`needlepoint-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  }

  const importRef=useRef();
  async function handleImport(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const saves=[];
        if(data.projects)saves.push(sbSet("projects",data.projects));
        if(data.inventory)saves.push(sbSet("inventory",data.inventory));
        if(data.wishlist)saves.push(sbSet("wishlist",data.wishlist));
        await Promise.all(saves);
        alert("Import successful! Refresh the page to see your data.");
      }catch(err){alert("Import failed: "+err.message);}
    };
    r.readAsText(f);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{...card,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto"}}>
        <h2 style={{margin:"0 0 8px",fontSize:18,fontWeight:700}}>⚙️ Settings</h2>

        <div style={{marginBottom:20,paddingBottom:20,borderBottom:`1px solid ${LINEN_BORDER}`}}>
          <label style={lbl}>Anthropic API Key</label>
          <p style={{margin:"0 0 8px",fontSize:13,color:TEXT_SOFT}}>Stored only in this browser. Used only for auto-fill requests sent directly to Anthropic.</p>
          <input type="password" style={{...inputBase,marginBottom:8,fontFamily:"monospace"}} value={draftKey} onChange={e=>setDraftKey(e.target.value)} placeholder="sk-ant-..."/>
          <p style={{margin:"0 0 0",fontSize:12,color:TEXT_SOFT}}>Get yours at <a href="https://console.anthropic.com" target="_blank" style={{color:PLUM}}>console.anthropic.com</a>.</p>
        </div>

        <div style={{marginBottom:20,paddingBottom:20,borderBottom:`1px solid ${LINEN_BORDER}`}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>Export & Backup</div>
          <p style={{margin:"0 0 10px",fontSize:13,color:TEXT_SOFT}}>Download all your projects, threads, and wishlist as a JSON file you can re-import later.</p>
          <button onClick={exportData} style={btnSecondary}>⬇ Download backup</button>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>Import Data</div>
          <p style={{margin:"0 0 10px",fontSize:13,color:TEXT_SOFT}}>Restore from a previously exported backup file. This will overwrite your current data.</p>
          <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/>
          <button onClick={()=>importRef.current.click()} style={btnSecondary}>⬆ Import backup</button>
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={btnSecondary}>Cancel</button>
          <button onClick={save} style={btnPrimary}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ── Finished Objects (within project detail) ──────────────────────────────────
function FinishedObjectsSection({project,setProjects}){
  const [editing,setEditing]=useState(null);
  const [draft,setDraft]=useState(null);
  const photoRef=useRef();
  const fos=project.finishedObjects||[];
  function openNew(){setDraft(blankFinishedObject(project.id));setEditing("new");}
  function openEdit(fo){setDraft({...fo});setEditing(fo.id);}
  function save(){
    if(!draft.type&&!draft.photo){alert("Add a type or photo.");return;}
    setProjects(prev=>prev.map(p=>{
      if(p.id!==project.id)return p;
      const updated=editing==="new"?[...fos,{...draft,id:Date.now()}]:fos.map(o=>o.id===editing?draft:o);
      return{...p,finishedObjects:updated};
    }));
    setEditing(null);setDraft(null);
  }
  function del(){
    if(!confirm("Remove this finished piece?"))return;
    setProjects(prev=>prev.map(p=>{if(p.id!==project.id)return p;return{...p,finishedObjects:fos.filter(o=>o.id!==editing)};}));
    setEditing(null);setDraft(null);
  }
  function upd(k,v){setDraft(d=>({...d,[k]:v}));}
  function pickPhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>upd("photo",ev.target.result);r.readAsDataURL(f);}

  if(editing&&draft)return(
    <div style={card}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
        <button onClick={()=>{setEditing(null);setDraft(null);}} style={{...btnSecondary,fontSize:12}}>← Back</button>
        <h3 style={{margin:0,fontSize:16,fontWeight:700,flex:1}}>{editing==="new"?"Add Finished Piece":"Edit Finished Piece"}</h3>
      </div>
      <div style={{display:"grid",gap:12}}>
        <div><label style={lbl}>What was it made into?</label><select style={inputBase} value={draft.type} onChange={e=>upd("type",e.target.value)}><option value="">— select type —</option>{FINISHED_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={lbl}>Finisher / Shop</label><input style={inputBase} value={draft.finisher} onChange={e=>upd("finisher",e.target.value)} placeholder="e.g. The Needlepoint Shop"/></div>
          <div><label style={lbl}>Date Finished</label><input type="date" style={inputBase} value={draft.dateFinished} onChange={e=>upd("dateFinished",e.target.value)}/></div>
        </div>
        <div><label style={lbl}>Notes</label><textarea style={{...inputBase,minHeight:56,resize:"vertical",fontFamily:"Georgia,serif"}} value={draft.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Any notes..."/></div>
        <div>
          <label style={lbl}>Photo</label>
          {draft.photo&&<div style={{marginBottom:8}}><img src={draft.photo} alt="" style={{maxWidth:160,maxHeight:160,objectFit:"cover",borderRadius:8,border:`1px solid ${LINEN_BORDER}`}}/><div><button onClick={()=>upd("photo",null)} style={{...btnDanger,fontSize:13,marginTop:4}}>Remove</button></div></div>}
          <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={pickPhoto}/>
          <button onClick={()=>photoRef.current.click()} style={btnSecondary}>{draft.photo?"Replace photo":"Upload photo"}</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          {editing!=="new"&&<button onClick={del} style={{...btnSecondary,color:"#C0785A",borderColor:"#C0785A"}}>Delete</button>}
          <button onClick={save} style={{...btnPrimary,marginLeft:"auto"}}>Save Piece</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={card}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:fos.length>0?12:0}}>
        <span style={lbl}>Finished Pieces</span>
        <button onClick={openNew} style={{...btnSecondary,fontSize:12,padding:"5px 10px"}}>+ Add</button>
      </div>
      {fos.length===0&&<p style={{color:TEXT_SOFT,fontSize:13,margin:0}}>No finished pieces yet.</p>}
      {fos.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
          {fos.map(fo=>(
            <div key={fo.id} onClick={()=>openEdit(fo)} style={{cursor:"pointer",borderRadius:8,overflow:"hidden",border:`1px solid ${LINEN_BORDER}`,background:LINEN_DARK}}>
              {fo.photo?<img src={fo.photo} alt="" style={{width:"100%",height:110,objectFit:"cover",display:"block"}}/>:<div style={{height:110,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🎁</div>}
              <div style={{padding:"6px 8px"}}><div style={{fontSize:12,fontWeight:600,color:TEXT}}>{fo.type||"Piece"}</div>{fo.finisher&&<div style={{fontSize:11,color:TEXT_SOFT}}>by {fo.finisher}</div>}{fo.dateFinished&&<div style={{fontSize:10,color:TEXT_SOFT}}>{fo.dateFinished}</div>}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [projects,setProjects]=useState([]);
  const [inventory,setInventory]=useState([]);
  const [wishlist,setWishlist]=useState([]);
  const [apiKey,setApiKey]=useState(()=>lsStr(KEY_KEY));
  const [loading,setLoading]=useState(true);
  const [syncStatus,setSyncStatus]=useState("idle"); // idle | saving | saved | error

  // Load all data from Supabase on mount
  useEffect(()=>{
    Promise.all([sbGet("projects"),sbGet("inventory"),sbGet("wishlist")]).then(([p,i,w])=>{
      setProjects(p||[]);
      setInventory(i||[]);
      setWishlist(w||[]);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);
  const [tab,setTab]=useState("projects");
  const [view,setView]=useState("list");
  const [activeId,setActiveId]=useState(null);
  const [draft,setDraft]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showPwGate,setShowPwGate]=useState(false);

  useEffect(()=>{
    function closePwGate(){setShowPwGate(false);}
    window.addEventListener("closepwgate",closePwGate);
    return()=>window.removeEventListener("closepwgate",closePwGate);
  },[]);

  function openSettings(){setShowPwGate(true);}
  function onPwUnlock(){setShowPwGate(false);setShowSettings(true);}

  // Save to Supabase whenever data changes (skip on initial empty load)
  const isFirstRender=useRef(true);
  useEffect(()=>{
    if(loading)return;
    if(isFirstRender.current){isFirstRender.current=false;return;}
    setSyncStatus("saving");
    Promise.all([sbSet("projects",projects),sbSet("inventory",inventory),sbSet("wishlist",wishlist)])
      .then(()=>setSyncStatus("saved"))
      .catch(()=>setSyncStatus("error"));
    const t=setTimeout(()=>setSyncStatus("idle"),3000);
    return()=>clearTimeout(t);
  },[projects,inventory,wishlist]);

  function openNew(){setDraft(blankProject());setActiveId(null);setView("edit");}
  function openEdit(id){setDraft(JSON.parse(JSON.stringify(projects.find(x=>x.id===id))));setActiveId(id);setView("edit");}
  function openDetail(id){setActiveId(id);setView("detail");}
  function saveDraft(){
    if(!draft.name.trim()){alert("Canvas name is required!");return;}
    if(activeId)setProjects(prev=>prev.map(p=>p.id===activeId?draft:p));
    else setProjects(prev=>[...prev,draft]);
    setView("list");setDraft(null);
  }
  function deleteProject(id){if(!confirm("Delete this project?"))return;setProjects(prev=>prev.filter(p=>p.id!==id));setView("list");}
  function upd(k,v){setDraft(d=>({...d,[k]:v}));}
  function addColor(){upd("colors",[...draft.colors,{id:Date.now(),brand:"Pepper Pot Silk",code:"",name:"",hex:"#cccccc",element:""}]);}
  function updateColor(id,u){upd("colors",draft.colors.map(c=>c.id===id?u:c));}
  function removeColor(id){upd("colors",draft.colors.filter(c=>c.id!==id));}
  function addStitchArea(){upd("stitchAreas",[...draft.stitchAreas,{id:Date.now(),area:"",stitch:"",notes:""}]);}
  function updateStitchArea(id,u){upd("stitchAreas",draft.stitchAreas.map(a=>a.id===id?u:a));}
  function removeStitchArea(id){upd("stitchAreas",draft.stitchAreas.filter(a=>a.id!==id));}
  function applyAutofill(s){setDraft(d=>({...d,name:d.name||s.name||"",designer:d.designer||s.designer||"",supplier:d.supplier||s.supplier||"",canvasSize:d.canvasSize||s.canvasSize||"",meshCount:d.meshCount||s.meshCount||"",notes:d.notes?(d.notes+(s.notes?"\n\n"+s.notes:"")):(s.notes||""),colors:s.colors&&s.colors.length>0?s.colors:d.colors,stitchAreas:s.stitchAreas&&s.stitchAreas.length>0?s.stitchAreas:d.stitchAreas}));}

  const TABS=[["projects","🪡 Projects"],["threads","🧵 Threads"],["shopping","🛒 Shopping"],["wishlist","🛍️ Wishlist"],["stitched","✂️ Stitched"],["finished","🎁 Finished"]];

  function TabBar({showNew}){
    return(
      <div style={{background:"#fff",borderBottom:`1px solid ${LINEN_BORDER}`,padding:"14px 16px 0",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div>
              <div style={{fontSize:10,fontFamily:"sans-serif",fontWeight:700,letterSpacing:"0.14em",color:PLUM_LIGHT,textTransform:"uppercase",marginBottom:2}}>Needlepoint Studio</div>
              <h1 style={{margin:0,fontSize:19,fontWeight:400,color:TEXT}}>Project Tracker</h1>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {showNew&&<button onClick={openNew} style={{...btnPrimary,padding:"7px 12px",fontSize:13}}>+ New</button>}
              <button onClick={openSettings} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:"4px",color:TEXT_SOFT}}>⚙️</button>
            </div>
          </div>
          <div style={{display:"flex",gap:0,overflowX:"auto",WebkitOverflowScrolling:"touch",msOverflowStyle:"none",scrollbarWidth:"none"}}>
            {TABS.map(([t,lb])=>(
              <button key={t} onClick={()=>{setTab(t);if(t!=="projects")setView("list");}} style={{background:"none",border:"none",borderBottom:tab===t?`2.5px solid ${PLUM}`:"2.5px solid transparent",padding:"6px 10px",fontFamily:"inherit",fontSize:12,fontWeight:tab===t?700:400,color:tab===t?PLUM:TEXT_SOFT,cursor:"pointer",marginBottom:-1,whiteSpace:"nowrap"}}>
                {lb}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if(loading)return(
    <div style={{minHeight:"100vh",background:LINEN,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",color:TEXT_SOFT,gap:16}}>
      <div style={{fontSize:40}}>🪡</div>
      <div style={{fontSize:16}}>Loading your projects...</div>
    </div>
  );

  const wrap=(children,showNew=false)=>(
    <div style={{minHeight:"100vh",background:LINEN,fontFamily:"Georgia, serif",color:TEXT,paddingBottom:60}}>
      {showPwGate&&<PasswordGate onUnlock={onPwUnlock}/>}
      {showSettings&&<SettingsPanel apiKey={apiKey} setApiKey={setApiKey} projects={projects} inventory={inventory} wishlist={wishlist} onClose={()=>setShowSettings(false)}/>}
      <TabBar showNew={showNew}/>
      {syncStatus==="saving"&&<div style={{position:"fixed",bottom:16,right:16,background:PLUM,color:"#fff",fontFamily:"sans-serif",fontSize:12,padding:"6px 12px",borderRadius:20,zIndex:500,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>Saving...</div>}
      {syncStatus==="saved"&&<div style={{position:"fixed",bottom:16,right:16,background:GREEN,color:"#fff",fontFamily:"sans-serif",fontSize:12,padding:"6px 12px",borderRadius:20,zIndex:500,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>✓ Saved</div>}
      {syncStatus==="error"&&<div style={{position:"fixed",bottom:16,right:16,background:RED,color:"#fff",fontFamily:"sans-serif",fontSize:12,padding:"6px 12px",borderRadius:20,zIndex:500,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>⚠ Sync error</div>}
      <div style={{maxWidth:900,margin:"20px auto",padding:"0 16px"}}>{children}</div>
    </div>
  );

  if(tab==="threads")return wrap(<InventoryTab inventory={inventory} setInventory={setInventory} apiKey={apiKey}/>);
  if(tab==="shopping")return wrap(<ShoppingListTab projects={projects} inventory={inventory}/>);
  if(tab==="wishlist")return wrap(<WishlistTab wishlist={wishlist} setWishlist={setWishlist} apiKey={apiKey}/>);
  if(tab==="stitched")return wrap(<GalleryTab projects={projects} threshold="Stitching Complete" title="Finished Stitching" emoji="✂️" description="Photos tagged Stitching Complete from projects at that status or beyond." onGoToProject={id=>{setTab("projects");openDetail(id);}}/>);
  if(tab==="finished")return wrap(<GalleryTab projects={projects} threshold="Finished" title="Finished Projects" emoji="🎁" description="Photos tagged Finished from completed or gifted projects." onGoToProject={id=>{setTab("projects");openDetail(id);}}/>);

  // Projects list
  if(tab==="projects"&&view==="list")return wrap((
    <>
      {projects.length===0?(
        <div style={{...card,textAlign:"center",padding:"60px 24px"}}><div style={{fontSize:48,marginBottom:14}}>🪡</div><p style={{color:TEXT_SOFT,fontSize:16,margin:"0 0 18px"}}>No canvases yet.</p><button onClick={openNew} style={btnPrimary}>+ New Canvas</button></div>
      ):(
        <div style={{display:"grid",gap:12}}>
          {projects.map(p=>{
            const needed=p.colors.filter(c=>{const m=inventory.find(t=>t.brand.trim().toLowerCase()===c.brand.trim().toLowerCase()&&t.code.trim().toLowerCase()===c.code.trim().toLowerCase()&&t.code.trim()!=="");return(!m||m.skeins===0)&&c.brand&&c.code;});
            const thumb=projectThumb(p);
            return(
              <div key={p.id} style={{...card,display:"flex",gap:14,alignItems:"flex-start",cursor:"pointer"}} onClick={()=>openDetail(p.id)}>
                <div style={{width:64,height:64,borderRadius:8,background:LINEN_DARK,flexShrink:0,overflow:"hidden",border:`1px solid ${LINEN_BORDER}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {thumb?<img src={thumb} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:24}}>🪡</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:2}}>
                    <h2 style={{margin:0,fontSize:15,fontWeight:600,color:TEXT}}>{p.name}</h2>
                    <StatusBadge status={p.status||"Not Started"}/>
                  </div>
                  {p.designer&&<div style={{fontSize:12,color:TEXT_SOFT,marginBottom:2}}>{p.designer}</div>}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {p.canvasSize&&<span style={{fontSize:11,color:TEXT_SOFT,fontFamily:"sans-serif"}}>{p.canvasSize}</span>}
                    {p.meshCount&&<span style={{fontSize:11,color:TEXT_SOFT,fontFamily:"sans-serif"}}>{p.meshCount} mesh</span>}
                    {needed.length>0&&<span style={{fontSize:11,fontFamily:"sans-serif",color:RED,fontWeight:600}}>🛒 {needed.length} to buy</span>}
                  </div>
                  {p.colors.length>0&&<div style={{display:"flex",gap:3,marginTop:6,flexWrap:"wrap"}}>{p.colors.map(c=><Swatch key={c.id} hex={c.hex} size={15}/>)}</div>}
                  <div style={{marginTop:8}}><CanvasProgressBar percent={p.progress}/><div style={{fontFamily:"sans-serif",fontSize:11,color:PLUM,fontWeight:700,marginTop:2}}>{p.progress}% complete</div></div>
                </div>
                <button onClick={e=>{e.stopPropagation();openEdit(p.id);}} style={{...btnSecondary,flexShrink:0,alignSelf:"center",fontSize:12,padding:"5px 10px"}}>Edit</button>
              </div>
            );
          })}
        </div>
      )}
    </>
  ),true);

  // Project detail
  if(tab==="projects"&&view==="detail"){
    const p=projects.find(x=>x.id===activeId);
    if(!p){setView("list");return null;}
    const linked=p.colors.map(c=>{const m=inventory.find(t=>t.brand.trim().toLowerCase()===c.brand.trim().toLowerCase()&&t.code.trim().toLowerCase()===c.code.trim().toLowerCase()&&t.code.trim()!=="");return{...c,inStock:m?m.skeins>0:null,linked:!!m,skeins:m?.skeins};});
    const needToBuy=linked.filter(c=>c.linked&&!c.inStock);
    const haveAll=linked.filter(c=>c.linked&&c.inStock);
    const unlinked=linked.filter(c=>!c.linked&&c.brand&&c.code);
    const thumb=projectThumb(p);
    return wrap((
      <>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,flexWrap:"wrap"}}>
          <button onClick={()=>setView("list")} style={{...btnSecondary,fontSize:12}}>← Projects</button>
          <h1 style={{margin:0,fontSize:17,fontWeight:500,flex:1}}>{p.name}</h1>
          <button onClick={()=>openEdit(p.id)} style={btnPrimary}>Edit</button>
          <button onClick={()=>deleteProject(p.id)} style={{...btnSecondary,color:"#C0785A",borderColor:"#C0785A",fontSize:12}}>Delete</button>
        </div>
        <div style={{display:"grid",gap:14}}>
          <div style={{...card,display:"flex",gap:16,flexWrap:"wrap"}}>
            {thumb&&<img src={thumb} alt="" style={{width:110,height:110,objectFit:"cover",borderRadius:8,border:`1px solid ${LINEN_BORDER}`,flexShrink:0}}/>}
            <div style={{flex:1,minWidth:140}}>
              <div style={{marginBottom:8}}><StatusBadge status={p.status||"Not Started"}/></div>
              {p.designer&&<div style={{marginBottom:4}}><span style={lbl}>Designer</span>{p.designer}</div>}
              <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                {p.canvasSize&&<div><span style={lbl}>Size</span>{p.canvasSize}</div>}
                {p.meshCount&&<div><span style={lbl}>Mesh</span>{p.meshCount}</div>}
                {p.supplier&&<div><span style={lbl}>Supplier</span>{p.supplier}</div>}
              </div>
              {p.notes&&<div style={{marginTop:8}}><span style={lbl}>Notes</span><p style={{margin:0,fontSize:13,color:TEXT_SOFT,whiteSpace:"pre-wrap"}}>{p.notes}</p></div>}
            </div>
          </div>
          <div style={card}><span style={lbl}>Progress</span><CanvasProgressBar percent={p.progress}/><div style={{fontFamily:"sans-serif",fontSize:18,fontWeight:700,color:PLUM,marginTop:6}}>{p.progress}%</div></div>
          {p.photos&&p.photos.length>0&&<div style={card}><span style={lbl}>Photo Journal</span><PhotoJournalReadOnly photos={p.photos}/></div>}
          {p.colors.length>0&&(
            <div style={card}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <span style={lbl}>Thread Colors</span>
                {needToBuy.length>0&&<span style={{fontSize:12,fontFamily:"sans-serif",fontWeight:700,color:RED}}>🛒 {needToBuy.length} to buy</span>}
              </div>
              {needToBuy.length>0&&<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:RED,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Need to Buy</div>{needToBuy.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:5,padding:"7px 10px",background:RED_BG,borderRadius:7}}><Swatch hex={c.hex}/><div><span style={{fontFamily:"sans-serif",fontSize:13,fontWeight:600}}>{c.brand} {c.code}{c.name?` · ${c.name}`:""}</span>{c.element&&<span style={{fontSize:11,color:TEXT_SOFT,fontFamily:"sans-serif"}}> — {c.element}</span>}</div></div>)}</div>}
              {haveAll.length>0&&<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:GREEN,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>In My Collection</div>{haveAll.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:5,padding:"7px 10px",background:GREEN_BG,borderRadius:7}}><Swatch hex={c.hex}/><div style={{flex:1}}><span style={{fontFamily:"sans-serif",fontSize:13,fontWeight:600}}>{c.brand} {c.code}{c.name?` · ${c.name}`:""}</span>{c.element&&<span style={{fontSize:11,color:TEXT_SOFT,fontFamily:"sans-serif"}}> — {c.element}</span>}</div><span style={{fontSize:11,color:TEXT_SOFT,fontFamily:"sans-serif"}}>{c.skeins} skein{c.skeins!==1?"s":""}</span></div>)}</div>}
              {unlinked.length>0&&<div><div style={{fontSize:11,fontWeight:700,color:TEXT_SOFT,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Not in Inventory Yet</div>{unlinked.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:5,padding:"7px 10px",background:LINEN,borderRadius:7}}><Swatch hex={c.hex}/><span style={{fontFamily:"sans-serif",fontSize:13}}>{c.brand} {c.code}{c.name?` · ${c.name}`:""}</span>{c.element&&<span style={{fontSize:11,color:TEXT_SOFT,fontFamily:"sans-serif"}}> — {c.element}</span>}</div>)}</div>}
            </div>
          )}
          {p.stitchAreas.length>0&&(
            <div style={card}><span style={lbl}>Stitch Plan</span>
              <table style={{width:"100%",borderCollapse:"collapse",marginTop:8,fontFamily:"sans-serif",fontSize:13}}>
                <thead><tr style={{borderBottom:`2px solid ${LINEN_BORDER}`}}>{["Area","Stitch","Notes"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 8px 5px 0",color:TEXT_SOFT,fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</th>)}</tr></thead>
                <tbody>{p.stitchAreas.map(a=><tr key={a.id} style={{borderBottom:`1px solid ${LINEN_BORDER}`}}><td style={{padding:"7px 8px 7px 0"}}>{a.area}</td><td style={{padding:"7px 8px 7px 0",color:PLUM,fontWeight:600}}>{a.stitch}</td><td style={{padding:"7px 0",color:TEXT_SOFT}}>{a.notes}</td></tr>)}</tbody>
              </table>
            </div>
          )}
          <FinishedObjectsSection project={p} setProjects={setProjects}/>
        </div>
      </>
    ));
  }

  // Project edit
  if(tab==="projects"&&view==="edit"&&draft)return wrap((
    <>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
        <button onClick={()=>setView(activeId?"detail":"list")} style={{...btnSecondary,fontSize:12}}>Cancel</button>
        <h1 style={{margin:0,fontSize:17,fontWeight:500,flex:1}}>{activeId?`Edit: ${draft.name||"Untitled"}`:"New Canvas"}</h1>
        <button onClick={saveDraft} style={btnPrimary}>Save</button>
      </div>
      <div style={{display:"grid",gap:14}}>
        <AutofillPanel onApply={applyAutofill} apiKey={apiKey}/>
        <div style={card}>
          <h2 style={{margin:"0 0 14px",fontSize:16,fontWeight:700}}>Canvas Details</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{gridColumn:"1 / -1"}}><label style={lbl}>Canvas Name *</label><input style={inputBase} value={draft.name} onChange={e=>upd("name",e.target.value)} placeholder="e.g. Anna McKenzie Shell"/></div>
            <div><label style={lbl}>Designer</label><input style={inputBase} value={draft.designer} onChange={e=>upd("designer",e.target.value)} placeholder="e.g. Anna McKenzie Studio"/></div>
            <div><label style={lbl}>Supplier</label><input style={inputBase} value={draft.supplier} onChange={e=>upd("supplier",e.target.value)} placeholder="e.g. Nimble Needle"/></div>
            <div><label style={lbl}>Canvas Size</label><input style={inputBase} value={draft.canvasSize} onChange={e=>upd("canvasSize",e.target.value)} placeholder='e.g. 8" × 10"'/></div>
            <div><label style={lbl}>Mesh Count</label><input style={inputBase} value={draft.meshCount} onChange={e=>upd("meshCount",e.target.value)} placeholder="e.g. 18"/></div>
            <div><label style={lbl}>Date Started</label><input type="date" style={inputBase} value={draft.startedAt} onChange={e=>upd("startedAt",e.target.value)}/></div>
          </div>
          <div style={{marginTop:12}}><label style={lbl}>Notes</label><textarea style={{...inputBase,minHeight:64,resize:"vertical",fontFamily:"Georgia, serif"}} value={draft.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Any notes..."/></div>
        </div>
        <div style={card}>
          <h2 style={{margin:"0 0 12px",fontSize:16,fontWeight:700}}>Project Status</h2>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {PROJECT_STATUSES.map(s=>{
              const active=(draft.status||"Not Started")===s;
              const sc=STATUS_COLOR[s];
              return(
                <button key={s} onClick={()=>upd("status",s)} style={{border:`1.5px solid ${active?sc.color:LINEN_BORDER}`,background:active?sc.bg:"#fff",color:active?sc.color:TEXT_SOFT,borderRadius:20,padding:"6px 14px",fontFamily:"inherit",fontSize:13,fontWeight:active?700:400,cursor:"pointer"}}>
                  {s}
                </button>
              );
            })}
          </div>
        </div>
        <div style={card}>
          <h2 style={{margin:"0 0 4px",fontSize:16,fontWeight:700}}>Photo Journal</h2>
          <p style={{margin:"0 0 14px",fontSize:13,color:TEXT_SOFT,fontFamily:"sans-serif"}}>Select a stage, then tap + Add Photo. On your phone you'll get the option to take a photo or choose from your library.</p>
          <PhotoJournal photos={draft.photos||[]} onChange={v=>upd("photos",typeof v==="function"?v(draft.photos||[]):v)}/>
        </div>
        <div style={card}>
          <h2 style={{margin:"0 0 12px",fontSize:16,fontWeight:700}}>Progress</h2>
          <CanvasProgressBar percent={draft.progress}/>
          <div style={{display:"flex",alignItems:"center",gap:12,marginTop:10}}>
            <input type="range" min={0} max={100} step={1} value={draft.progress} onChange={e=>upd("progress",Number(e.target.value))} style={{flex:1,accentColor:PLUM,cursor:"pointer"}}/>
            <span style={{fontFamily:"sans-serif",fontWeight:700,color:PLUM,fontSize:18,minWidth:44}}>{draft.progress}%</span>
          </div>
        </div>
        <div style={card}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div><h2 style={{margin:0,fontSize:16,fontWeight:700}}>Thread Colors</h2><p style={{margin:"3px 0 0",fontSize:11,color:TEXT_SOFT,fontFamily:"sans-serif"}}>Matching brand + code to inventory shows stock status</p></div>
            <button onClick={addColor} style={btnSecondary}>+ Add</button>
          </div>
          {draft.colors.length===0&&<p style={{color:TEXT_SOFT,fontSize:14,margin:0}}>No colors yet.</p>}
          {draft.colors.map(c=><ProjectColorRow key={c.id} color={c} inventory={inventory} onChange={u=>updateColor(c.id,u)} onRemove={()=>removeColor(c.id)}/>)}
        </div>
        <div style={card}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <h2 style={{margin:0,fontSize:16,fontWeight:700}}>Stitch Plan</h2>
            <button onClick={addStitchArea} style={btnSecondary}>+ Add Area</button>
          </div>
          {draft.stitchAreas.length===0&&<p style={{color:TEXT_SOFT,fontSize:14,margin:0}}>No stitch areas yet.</p>}
          {draft.stitchAreas.map(a=>(
            <div key={a.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
              <input placeholder="Area" value={a.area} onChange={e=>updateStitchArea(a.id,{...a,area:e.target.value})} style={inputSm}/>
              <input placeholder="Stitch type" value={a.stitch} onChange={e=>updateStitchArea(a.id,{...a,stitch:e.target.value})} style={inputSm}/>
              <input placeholder="Notes" value={a.notes} onChange={e=>updateStitchArea(a.id,{...a,notes:e.target.value})} style={{...inputSm,flex:2}}/>
              <button onClick={()=>removeStitchArea(a.id)} style={btnDanger}>✕</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          {activeId&&<button onClick={()=>deleteProject(activeId)} style={{...btnSecondary,color:"#C0785A",borderColor:"#C0785A"}}>Delete Project</button>}
          <button onClick={saveDraft} style={{...btnPrimary,fontSize:15,padding:"11px 26px"}}>Save Project</button>
        </div>
      </div>
    </>
  ));

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
